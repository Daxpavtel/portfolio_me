<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — DevPortfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">
</head>
<body>
  <div class="admin-dashboard">
    <aside class="admin-sidebar">
      <h2><span>Dev</span>Portfolio</h2>
      <nav class="admin-nav">
        <button class="active" data-panel="projects">Projects</button>
        <button data-panel="skills">Skills</button>
        <button data-panel="experience">Experience</button>
        <button data-panel="messages">Messages</button>
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </nav>
    </aside>
    <main class="admin-main">
      <!-- Projects Panel -->
      <div class="admin-panel active" id="panel-projects">
        <div class="admin-toolbar">
          <h1>Projects</h1>
          <button class="btn btn-primary btn-sm" id="addProjectBtn">+ Add Project</button>
        </div>
        <div id="projectsList"></div>
      </div>

      <!-- Skills Panel -->
      <div class="admin-panel" id="panel-skills">
        <div class="admin-toolbar">
          <h1>Skills</h1>
          <button class="btn btn-primary btn-sm" id="addSkillBtn">+ Add Skill</button>
        </div>
        <div id="skillsList"></div>
      </div>

      <!-- Experience Panel -->
      <div class="admin-panel" id="panel-experience">
        <div class="admin-toolbar">
          <h1>Experience</h1>
          <button class="btn btn-primary btn-sm" id="addExperienceBtn">+ Add Experience</button>
        </div>
        <div id="experienceList"></div>
      </div>

      <!-- Messages Panel -->
      <div class="admin-panel" id="panel-messages">
        <h1>Messages</h1>
        <div id="messagesList"></div>
      </div>
    </main>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/admin/auth.js"></script>
  <script src="../js/admin/dashboard.js"></script>
  <script src="../js/admin/projects-admin.js"></script>
  <script src="../js/admin/skills-admin.js"></script>
  <script src="../js/admin/experience-admin.js"></script>
  <script src="../js/admin/messages-admin.js"></script>
</body>
</html>
